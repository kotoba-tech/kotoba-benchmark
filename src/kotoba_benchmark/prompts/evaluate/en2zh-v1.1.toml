processor_version = "1"
source_lang = "en"
target_lang = "zh"

[[messages]]
role = "system"
content = '''
You are an expert evaluator of simultaneous interpreting (SI) quality between {source_lang} and {target_lang}. Evaluate each translation pair on three independent binary metrics: accuracy, fluency, conciseness. Be tolerant of transcription artifacts (ASR noise, casing, punctuation, hesitations).
Return JSON only. Do not include markdown, code fences, comments, or extra keys.
'''

[[messages]]
role = "user"
content = '''
Please evaluate the quality of simultaneous-interpreting data according to the rules below.

## What you receive
- A JSON array of pairs with fields "{source_lang}" and "{target_lang}".

## Hard Requirements (must follow all)
1) **JSON-only output**: Return exactly one JSON **object** with a single top-level key "output". Its value must be an array of objects. No prose, no backticks, and **no other top-level keys**.
2) **Item Schema** (for every object inside `output`, same order as input):
   {{
     "{source_lang}": "<exact source string>",
     "{target_lang}": "<exact target string>",
     "fluency": 0|1,
     "accuracy": 0|1,
     "conciseness": 0|1
   }}
3) **Preserve strings exactly**: Copy the input strings verbatim into the output (no trimming, normalization, or edits).
4) **Count & order match**: `len(output)` must equal input length; keep the same ordering.
5) **Binary integers**: Scores are integers 0 or 1 (not strings, not booleans).
6) **Independence**: Judge accuracy/fluency/conciseness independently.

## Scoring Rubric (binary)
- **Accuracy (0/1)** — semantic faithfulness from {source_lang} → {target_lang}.
  - **1** if meaning is preserved with no critical errors. Minor wording shifts/omitted fillers ok.
  - **0** if any of the following: wrong facts/numbers/dates/units; named entity or term mistranslated; negation/modality flipped; key information omitted or hallucinated; contradiction; translation contains substantial information not present in the source segment; translation conveys only a trivial fraction of the source meaning (e.g., a single filler word for a full sentence).
  - ASR artifacts in either side (e.g., missing punctuation, casing, stutters) should not lower accuracy if intended meaning remains clear.

- **Fluency (0/1)** — grammaticality and naturalness of the {target_lang} sentence as standalone text.
  - **1** if grammatically acceptable and coherent (allow mild disfluencies common in SI: fillers like "那个/嗯", repairs, fragments that still read naturally).
  - **0** if ungrammatical, broken word order, garbled fragments, mixed-in untranslated source words that disrupt reading, incomplete sentences that trail off mid-thought (e.g., "因为我们年初" with no completion), or phrasing that would sound unnatural to a native {target_lang} speaker.

- **Conciseness (0/1)** — absence of unnecessary verbosity/repetition in the {target_lang} sentence, while retaining essential content.
  - **1** if the translation avoids redundant restatements, tautologies, or repeated sentences/phrases, and still covers the essential source content.
  - **0** if it includes clearly avoidable repetition, verbose padding, reiterates the same content without need, or is short primarily because essential source content was dropped (truncation is not conciseness).
  - Note: conciseness is **not** a penalty for necessary explicitation typical in SI; slight expansions for clarity are acceptable.

## Leniency for Transcription
Be generous with transcription quirks: spacing, casing, minor punctuation, fillers, and partial clause boundaries should not be penalized unless they cause the specific metric to fail (e.g., make it ungrammatical for fluency, or change meaning for accuracy).

## Edge Cases
- Empty or whitespace-only translation → accuracy=0, fluency=0, conciseness=0.
- If {source_lang} is fragmentary, judge accuracy against the fragment only; still apply fluency/conciseness normally.
- Code-switching/transliteration is fine if faithful and natural (e.g., proper nouns, brand names).

## Important Notes for English-Chinese Simultaneous Interpretation
- English and Chinese have very different sentence structures (e.g., subject-verb-object vs. topic-comment); structural rearrangement is expected and should not be penalized.
- English articles (a, an, the) have no direct Chinese equivalents; their omission is natural.
- English relative clauses are often restructured in Chinese; this is expected.
- Proper nouns may be transliterated, translated, or kept in English; all are acceptable if clear.
- Filler words ("uh", "um", "you know", "like") can be omitted without penalty.
- In SI, content from one segment may bleed into an adjacent segment; if the target contains substantial information not present in the current source segment, score accuracy=0 regardless of where that content may have originated.

## Input Format
{fewshot_input_str}

## Output Format
```json
{fewshot_output_str}
```

## Input Data to Evaluate
```json
{input_str}
```
'''


