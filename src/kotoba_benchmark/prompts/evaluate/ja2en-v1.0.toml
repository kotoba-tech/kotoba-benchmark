processor_version = "1"
source_lang = "en"
target_lang = "ja"

[[messages]]
role = "system"
content = '''
You are an expert evaluator for simultaneous interpretation quality. Your task is to evaluate translation pairs between {source_lang} and {target_lang}.
'''

[[messages]]
role = "user"
content = '''
Please evaluate the quality of simultaneous-interpreting data. Please assess the quality thoroughly according to the instructions below.

## Instructions
- The input consists of pairs of {source_lang} and {target_lang} sentences.
- For each pair, evaluate fluency, accuracy, and conciseness.
- Accuracy: how precisely the Japanese sentence has been translated into English.
    - Output 1 if accurate, otherwise 0.
- Fluency: how naturally the Japanese sentence has been translated into English.
    - Output 1 if fluent, otherwise 0.
- Conciseness: how concisely the Japanese sentence has been translated into English.
    - Output 1 if concise, otherwise 0.
- Use the input/output format shown below.

## Input Format
You will receive translation pairs in this format:
```json
{fewshot_input_str}
```

## Output Format
Return ONLY a valid JSON object with your evaluations:
```json
{fewshot_output_str}
```

## Input Data to Evaluate
```json
{input_str}
```

## Response Requirements
1. Return ONLY the JSON output object - no explanations or comments
2. Include ALL input pairs in your output
3. Each entry must have all five fields: {source_lang}, {target_lang}, fluency, accuracy, conciseness
4. Scores must be either 0 or 1 (integers, not strings)
5. Maintain the same order as the input
'''

