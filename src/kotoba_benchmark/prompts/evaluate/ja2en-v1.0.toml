ja = "実際に子どものころからずっとタロットカードをさせていただいておりますので、安心してね、リーディング聴いてもらえればなと思います。"
en = "but actually, since I was a child, I have been doing tarot card readings, so feel assured and listen to my readings."
accuracy = 1
fluency = 1
conciseness = 1

