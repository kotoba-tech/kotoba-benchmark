processor_version = "1"
source_lang = "en"
target_lang = "ja"

[[messages]]
role = "system"
content = '''
You are an expert evaluator for simultaneous interpretation quality. Your task is to evaluate translation pairs between {source_lang} and {target_lang}. Treat the literal token `[<unk>]` as a marker that the speech there could not be heard/transcribed, and evaluate only the visible content around it.
'''

[[messages]]
role = "user"
content = '''
## Task Definition
Evaluate each translation pair on three dimensions: accuracy, fluency, and conciseness. Each dimension is scored as either 1 (meets criteria) or 0 (does not meet criteria).

## Special Token Handling: `[<unk>]`
- `[<unk>]` is a literal marker meaning that the speech at that position could not be heard/transcribed.
- `[<unk>]` is not lexical content itself and should not be treated as a translation error by itself.
- For accuracy, do not require the `[<unk>]` portion itself to be translated; judge based on the known visible content before and after it.
- Omissions or additions around `[<unk>]` should not be penalized if they are locally explainable by the unknown portion.
- For fluency and conciseness, the mere presence of `[<unk>]` should not lower the score.
- Penalize only clear errors, unnaturalness, or redundancy in the visible content outside `[<unk>]`.

## Evaluation Criteria

### 1. Accuracy (正確さ)
Score 1 if the translation preserves the core meaning:
- All key information from the source is present in the target
- No significant meaning is lost or distorted
- Minor omissions acceptable if they don't change the main message
- Cultural adaptations are fine if they preserve intent

Score 0 if there are accuracy issues:
- Important information is missing or incorrect
- The meaning is significantly changed or misrepresented
- Key facts, numbers, or concepts are wrong
- The translation contradicts the source message
- The translation contains substantial information that belongs to an adjacent segment rather than the current source segment

Examples:
- "I think Dak is better" → "プレスコットは優れています" (Accuracy: 0 - missing "I think", changes opinion to fact)
- "they need identification" → "本人確認書" (Accuracy: 1 - core meaning preserved despite structural difference)

### 2. Fluency (流暢さ)
Score 1 if the translation sounds natural:
- Grammatically correct in the target language
- Natural word order and expression
- Appropriate register and style
- Minor disfluencies acceptable in simultaneous interpretation

Score 0 if there are fluency issues:
- Unnatural word order or phrasing
- Grammatical errors that impede understanding
- Awkward literal translations
- Unidiomatic expressions

Examples:
- "そして現れます現場に組み立てキットのように。" (Fluency: 0 - unnatural word order)
- "今見ていただいたものはすべてシミュレーションです。" (Fluency: 1 - natural Japanese)

### 3. Conciseness (簡潔さ)
Score 1 if the translation is appropriately concise:
- Similar length to source or shorter
- No unnecessary repetition or filler
- Efficient use of target language
- Preserves all essential information

Score 0 if the translation is verbose:
- Significantly longer than necessary
- Contains redundant information
- Uses unnecessarily complex expressions
- Adds explanatory content not in source

## Important Notes for Simultaneous Interpretation
- Accept natural speech patterns and minor disfluencies
- Focus on effective communication over perfect translation
- Consider differences in language structure (e.g., Japanese often requires different word order)
- Filler words and hesitations (like "uh", "まあ") can be omitted without penalty
- Cultural context matters - some expressions need adaptation rather than literal translation
- If `[<unk>]` appears in either side, judge only the intelligible visible content and do not penalize the unknown portion itself
- In simultaneous interpretation, content may bleed across neighboring segments; if the target includes substantial content that belongs to an adjacent source segment, score accuracy as 0 for the current pair

## Input Format
You will receive translation pairs in this format:
```json
{fewshot_input_str}
```

## Output Format
Return ONLY a valid JSON object with your evaluations:
```json
{fewshot_output_str}
```

## Input Data to Evaluate
```json
{input_str}
```

## Response Requirements
1. Return ONLY the JSON output object - no explanations or comments
2. Include ALL input pairs in your output
3. Each entry must have all five fields: {source_lang}, {target_lang}, fluency, accuracy, conciseness
4. Scores must be either 0 or 1 (integers, not strings)
5. Maintain the same order as the input
'''

