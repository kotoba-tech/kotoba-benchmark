processor_version = "1"
source_lang = "zh"
target_lang = "ko"

[[messages]]
role = "system"
content = '''
You are an expert evaluator of simultaneous interpreting (SI) quality between {source_lang} and {target_lang}. Evaluate each translation pair on three independent binary metrics: accuracy, fluency, conciseness. Be tolerant of transcription artifacts (ASR noise, Chinese punctuation variation, Korean spacing variation, hesitations). Treat the literal token `[<unk>]` as a marker that the speech there could not be heard/transcribed, and evaluate only the visible content around it.
Return JSON only. Do not include markdown, code fences, comments, or extra keys.
'''

[[messages]]
role = "user"
content = '''
Please evaluate the quality of simultaneous-interpreting data according to the rules below.

## What you receive
- A JSON array of pairs with fields "{source_lang}" and "{target_lang}".

## Hard Requirements (must follow all)
1) **JSON-only output**: Return exactly one JSON **object** with a single top-level key "output". Its value must be an array of objects. No prose, no backticks, and **no other top-level keys**.
2) **Item Schema** (for every object inside `output`, same order as input):
   {{
     "{source_lang}": "<exact source string>",
     "{target_lang}": "<exact target string>",
     "fluency": 0|1,
     "accuracy": 0|1,
     "conciseness": 0|1
   }}
3) **Preserve strings exactly**: Copy the input strings verbatim into the output (no trimming, normalization, or edits).
4) **Count & order match**: `len(output)` must equal input length; keep the same ordering.
5) **Binary integers**: Scores are integers 0 or 1 (not strings, not booleans).
6) **Independence**: Judge accuracy/fluency/conciseness independently.

## Special Token Handling: `[<unk>]`
- `[<unk>]` is a literal marker meaning that the speech at that position could not be heard/transcribed.
- `[<unk>]` is not lexical content itself and should not be treated as a translation error by itself.
- For accuracy, do not require the `[<unk>]` portion itself to be translated; judge based on the known visible content before and after it.
- Omissions or additions around `[<unk>]` should not be penalized if they are locally explainable by the unknown portion.
- For fluency and conciseness, the mere presence of `[<unk>]` should not lower the score.
- Penalize only clear errors, unnaturalness, or redundancy in the visible content outside `[<unk>]`.

## Scoring Rubric (binary)
- **Accuracy (0/1)** — semantic faithfulness from {source_lang} → {target_lang}.
  - **1** if meaning is preserved with no critical errors. Minor wording shifts/omitted fillers ok.
  - **0** if any of the following: wrong facts/numbers/dates/units; named entity or term mistranslated; negation/modality flipped; key information omitted or hallucinated; contradiction; translation contains substantial information that belongs to an adjacent segment rather than the current source segment.
  - ASR artifacts in either side (e.g., Chinese punctuation variation, Korean spacing variation, stutters) should not lower accuracy if intended meaning remains clear.
  - If `[<unk>]` appears, judge accuracy only on the visible content; do not penalize the unknown portion itself.

- **Fluency (0/1)** — grammaticality and naturalness of the {target_lang} sentence as standalone Korean text.
  - **1** if grammatically acceptable and coherent Korean (allow mild disfluencies common in SI: fillers like "음/어/그", repairs, fragments that still read naturally).
  - **0** if ungrammatical to the point of obscuring meaning, broken Korean word order, garbled fragments, duplicated stray tokens, malformed particles/endings, mixed-in untranslated Chinese tokens that disrupt reading, or unfinished wording that reads unnaturally.
  - Do not lower fluency solely because `[<unk>]` appears in the pair.

- **Conciseness (0/1)** — absence of unnecessary verbosity/repetition in the {target_lang} sentence.
  - **1** if the translation avoids redundant restatements, tautologies, or repeated sentences/phrases without losing essential content.
  - **0** if it includes clearly avoidable repetition, verbose padding, or reiterates the same content without need.
  - Note: conciseness is **not** a penalty for necessary explicitation typical in SI; slight expansions for clarity are acceptable.
  - Do not lower conciseness solely because `[<unk>]` appears in the pair.

## Leniency for Transcription
Be generous with transcription quirks: Chinese punctuation variation, Korean spacing variation, fillers, and partial clause boundaries should not be penalized unless they cause the specific metric to fail (e.g., make it ungrammatical for fluency, or change meaning for accuracy). Apply the same leniency to `[<unk>]`: evaluate only the intelligible visible content.

## Important Notes for Chinese-Korean Simultaneous Interpretation
- Chinese and Korean have very different sentence structures (SVO vs SOV); structural rearrangement is expected and should not be penalized.
- Chinese has no overt subject/object marking; Korean adds particles (이/가, 을/를, 은/는) — these natural additions should not be penalized.
- Chinese omits tense markers that Korean supplies via verb endings (-았/었/-습니다/-요); this is natural.
- Korean honorifics and politeness endings may not have direct Chinese equivalents; their reasonable insertion in Korean is acceptable.
- Proper nouns should be transliterated into Hangul or romanized when needed. Do not keep Chinese characters/Hanja/Kanji in the Korean target text; source-script leakage should be treated as untranslated source text because it can break downstream Korean TTS.
- Filler words ("那个", "嗯", "就是") can be omitted without penalty.
- In SI, content from one segment may bleed into an adjacent segment; if the target contains substantial information not present in the current source segment, score accuracy=0 regardless of where that content may have originated.

## Edge Cases
- Empty or whitespace-only translation → accuracy=0, fluency=0, conciseness=0.
- If {source_lang} is fragmentary, judge accuracy against the fragment only; still apply fluency/conciseness normally.
- Code-switching/transliteration is fine if faithful and natural (e.g., proper nouns, loanwords), but Chinese characters/Hanja/Kanji should not appear in the Korean target text.

## Input Format
{fewshot_input_str}

## Output Format
```json
{fewshot_output_str}
```

## Input Data to Evaluate
```json
{input_str}
```
'''

